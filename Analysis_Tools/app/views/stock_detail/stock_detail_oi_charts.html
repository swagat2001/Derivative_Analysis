<!-- ==============================
     OI ANALYSIS CHARTS
     Interactive TradingView-based OI Visualization
     ============================== -->
<div class="oi-charts-section">
  <h3 class="section-title">OI Analysis (Interactive)</h3>

  {% if chart_data %}
  <!-- Chart container with embedded JSON -->
  <div
    id="oi-chart-container"
    class="chart-container"
    data-chart='{{ chart_data | safe }}'>
  </div>
  {% else %}
  <p class="no-data">No OI data available</p>
  {% endif %}
</div>

<!-- ==============================
     Script loading
     ============================== -->

<!-- ✅ Load TradingView Lightweight Charts (external CDN) -->
<script src="https://unpkg.com/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.production.js"></script>

<!-- ✅ Load local chart logic -->
<script src="{{ url_for('static', filename='js/stock_detail_oi_charts.js') }}" defer></script>
